[tools]
python = "3.11"
uv = "0.11"

[settings]
experimental = true
python.uv_venv_auto = true

[hooks]
postinstall = "uv sync"

[tasks]
check = ["uv sync", "ruff check", "mypy", "pytest"]

[tasks.socat]
description = "Copy between a pty (./socat.tmp) and a program (default $SHELL)"
usage = 'arg "[run]" var=#true default="{{env.SHELL}}"'
run = "socat -dd pty,raw,echo=0,link=socat.tmp exec:${usage_run},pty,stderr,setsid,ctty"
